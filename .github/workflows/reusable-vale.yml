# Source: errata-ai/vale-action (official)
# Centralized reusable workflow for prose linting across all openclaw-nsmg repos
# Caller usage:
#   jobs:
#     vale:
#       uses: openclaw-nsmg/.github/.github/workflows/reusable-vale.yml@main
#       with:
#         vale_config: '.vale.ini'
name: Reusable — Vale Prose Lint

on:
  workflow_call:
    inputs:
      vale_config:
        description: 'Path to .vale.ini config file'
        required: false
        type: string
        default: '.vale.ini'
      glob:
        description: 'File glob pattern to lint'
        required: false
        type: string
        default: 'src/**/*.{md,mdx,astro}'
      vale_version:
        description: 'Vale CLI version'
        required: false
        type: string
        default: '3.9.5'

jobs:
  prose-lint:
    name: prose-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Vale Linter
        uses: errata-ai/vale-action@v2
        with:
          version: ${{ inputs.vale_version }}
          files: ${{ inputs.glob }}
          vale_flags: "--config=${{ inputs.vale_config }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
