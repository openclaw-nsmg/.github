# ╔══════════════════════════════════════════════════════════════════╗
# ║  Claude Code Security Review — Organization Reusable Workflow    ║
# ╠══════════════════════════════════════════════════════════════════╣
# ║                                                                  ║
# ║  Wraps anthropics/claude-code-security-review for all repos      ║
# ║  under openclaw-nsmg organization.                               ║
# ║                                                                  ║
# ║  Usage in child repos:                                           ║
# ║    jobs:                                                         ║
# ║      security:                                                   ║
# ║        uses: openclaw-nsmg/.github/.github/workflows/            ║
# ║              claude-security-review.yml@main                     ║
# ║        secrets: inherit                                          ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
name: Claude Code Security Review (Org Base)
on:
  workflow_call:
    inputs:
      comment_pr:
        description: "Whether to comment on PRs with findings"
        required: false
        type: boolean
        default: true
      upload_results:
        description: "Whether to upload results as artifacts"
        required: false
        type: boolean
        default: true
      exclude_directories:
        description: "Comma-separated list of directories to exclude"
        required: false
        type: string
        default: ""
      timeout_minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 25
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  security-review:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Run Claude Code Security Review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          comment-pr: ${{ inputs.comment_pr }}
          upload-results: ${{ inputs.upload_results }}
          exclude-directories: ${{ inputs.exclude_directories }}
