name: Routine — PR Reviewer (API Relay)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  relay-to-routine:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Claude PR Reviewer Routine via API
        run: |
          curl -s -X POST \
            "https://api.anthropic.com/v1/claude_code/routines/trig_0174SvdFAFbWTfiJD44NuYkr/fire" \
            -H "Authorization: Bearer ${{ secrets.ROUTINE_PR_REVIEWER_TOKEN }}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"PR event in ${{ github.repository }}#${{ github.event.pull_request.number }}.\n\nTitle: ${{ github.event.pull_request.title }}\nAuthor: ${{ github.event.pull_request.user.login }}\nAction: ${{ github.event.action }}\nURL: ${{ github.event.pull_request.html_url }}\nBase: ${{ github.event.pull_request.base.ref }}\nHead: ${{ github.event.pull_request.head.ref }}\"}"
