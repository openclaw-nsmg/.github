# Source: eslint-plugin-i18next (npm) + alexop.dev "15-Layer Frontend Quality Pipeline" Layer 12
# Centralized reusable workflow for i18n hardcoded string detection
# Caller usage:
#   jobs:
#     i18n:
#       uses: openclaw-nsmg/.github/.github/workflows/reusable-i18n-lint.yml@main
name: Reusable — i18n Lint

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      package_manager:
        description: 'Package manager (pnpm, npm, yarn)'
        required: false
        type: string
        default: 'pnpm'
      lint_command:
        description: 'Lint command to run'
        required: false
        type: string
        default: 'pnpm eslint --rule "{\"i18next/no-literal-string\": \"warn\"}\" src/'

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package_manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      - name: Install dependencies
        run: ${{ inputs.package_manager }} install --frozen-lockfile

      - name: Run i18n lint
        run: ${{ inputs.lint_command }}
