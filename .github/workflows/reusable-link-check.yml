# =============================================================================
# Reusable Link Check CI (lychee)
# Source: lycheeverse/lychee-action (GitHub 2k+ stars)
# Reference: REPORT-097 §2 确定性任务 — lychee 替代自编 link checker
# Used by: Kubernetes docs, Rust docs, MDN
# =============================================================================
name: Reusable Link Check

on:
  workflow_call:
    inputs:
      paths:
        description: 'Glob patterns of files to check (space-separated)'
        required: false
        type: string
        default: '**.md **.html src/content/**'
      fail_on_broken:
        description: 'Whether to fail on broken links'
        required: false
        type: boolean
        default: true
      exclude_patterns:
        description: 'Regex patterns to exclude (newline-separated)'
        required: false
        type: string
        default: ''

jobs:
  link-check:
    name: Link Check (lychee)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --verbose
            --no-progress
            ${{ inputs.paths }}
          fail: ${{ inputs.fail_on_broken }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
