name: Routine — Changelog Generator (API Relay)

on:
  pull_request:
    types: [closed]

jobs:
  relay-to-routine:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Claude Changelog Generator Routine via API
        run: |
          curl -s -X POST \
            "https://api.anthropic.com/v1/claude_code/routines/trig_01UK5xFEnJmXgGxku9cVrjmx/fire" \
            -H "Authorization: Bearer ${{ secrets.ROUTINE_CHANGELOG_TOKEN }}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"PR merged in ${{ github.repository }}#${{ github.event.pull_request.number }}.\n\nTitle: ${{ github.event.pull_request.title }}\nAuthor: ${{ github.event.pull_request.user.login }}\nURL: ${{ github.event.pull_request.html_url }}\nBase: ${{ github.event.pull_request.base.ref }}\nMerged by: ${{ github.event.pull_request.merged_by.login }}\n\nBody:\n${{ github.event.pull_request.body }}\"}"
