# =============================================================================
# Reusable Lighthouse Performance Budget CI
# Source: treosh/lighthouse-ci-action (GitHub 1.2k+ stars)
# Reference: REPORT-110 §5 "Lighthouse 性能预算"
# Used by: Vercel, Netlify, Chrome DevRel
# =============================================================================
name: Reusable Lighthouse Gate

on:
  workflow_call:
    inputs:
      config_path:
        description: 'Path to lighthouserc.js config file'
        required: false
        type: string
        default: 'lighthouserc.js'
      budget_path:
        description: 'Path to lighthouse-budget.json'
        required: false
        type: string
        default: 'lighthouse-budget.json'
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      urls:
        description: 'Comma-separated URLs to audit (used if no config)'
        required: false
        type: string
        default: 'http://localhost:4321/'

jobs:
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Start preview server
        run: |
          pnpm preview &
          sleep 5

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ${{ inputs.config_path }}
          budgetPath: ${{ inputs.budget_path }}
          uploadArtifacts: true
          temporaryPublicStorage: true
