# =============================================================================
# Reusable Security Review CI (CodeQL + Trivy)
# Sources:
#   - github/codeql-action (GitHub official, 1.5k+ stars)
#   - aquasecurity/trivy-action (GitHub 1k+ stars)
# Reference: REPORT-098 §3 webapp-gate required status check
# Used by: GitHub Advanced Security customers, CNCF projects
# =============================================================================
name: Reusable Security Review

on:
  workflow_call:
    inputs:
      languages:
        description: 'Comma-separated CodeQL languages (javascript, typescript, python)'
        required: false
        type: string
        default: 'javascript-typescript'
      trivy_scan_type:
        description: 'Trivy scan type (fs, repo, image)'
        required: false
        type: string
        default: 'fs'
      severity:
        description: 'Minimum severity to report (CRITICAL, HIGH, MEDIUM, LOW)'
        required: false
        type: string
        default: 'CRITICAL,HIGH'

jobs:
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: ${{ inputs.trivy_scan_type }}
          scan-ref: '.'
          severity: ${{ inputs.severity }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.languages }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
