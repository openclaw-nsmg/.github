# =============================================================================
# Reusable Accessibility CI (axe-core via pa11y-ci)
# Source: pa11y/pa11y-ci (GitHub 2.5k+ stars)
# Reference: REPORT-110 §4 "axe-core 可访问性门控"
# Used by: Gov.uk, BBC, Financial Times
# =============================================================================
name: Reusable Accessibility Gate

on:
  workflow_call:
    inputs:
      base_url:
        description: 'Base URL to test (e.g., http://localhost:4321)'
        required: false
        type: string
        default: 'http://localhost:4321'
      config_path:
        description: 'Path to pa11y-ci config file'
        required: false
        type: string
        default: '.pa11yci'
      standard:
        description: 'WCAG standard to test against'
        required: false
        type: string
        default: 'WCAG2AA'
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'

jobs:
  accessibility:
    name: Accessibility (pa11y-ci)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Start preview server
        run: |
          pnpm preview &
          sleep 5

      - name: Install pa11y-ci
        run: npm install -g pa11y-ci

      - name: Run accessibility tests
        run: |
          if [ -f "${{ inputs.config_path }}" ]; then
            pa11y-ci --config ${{ inputs.config_path }}
          else
            pa11y-ci --standard ${{ inputs.standard }} \
              ${{ inputs.base_url }}/ \
              ${{ inputs.base_url }}/about \
              ${{ inputs.base_url }}/services \
              ${{ inputs.base_url }}/contact
          fi
