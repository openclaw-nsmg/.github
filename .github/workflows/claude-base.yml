# ╔══════════════════════════════════════════════════════════════════╗
# ║  Claude Code — Organization Reusable Workflow                    ║
# ╠══════════════════════════════════════════════════════════════════╣
# ║                                                                  ║
# ║  Central plugin & marketplace configuration for all repos        ║
# ║  under openclaw-nsmg organization.                               ║
# ║                                                                  ║
# ║  Usage in child repos:                                           ║
# ║    jobs:                                                         ║
# ║      claude:                                                     ║
# ║        uses: openclaw-nsmg/.github/.github/workflows/            ║
# ║              claude-base.yml@main                                ║
# ║        secrets: inherit                                          ║
# ║        with:                                                     ║
# ║          prompt: "your custom prompt here"                       ║
# ║                                                                  ║
# ╚══════════════════════════════════════════════════════════════════╝
name: Claude Code (Org Base)
on:
  workflow_call:
    inputs:
      prompt:
        description: "Instructions for Claude (plain text or skill name)"
        required: false
        type: string
        default: ""
      assignee_trigger:
        description: "GitHub username that triggers Claude when assigned"
        required: false
        type: string
        default: "claude"
      model:
        description: "Model to use"
        required: false
        type: string
        default: ""
      max_turns:
        description: "Maximum conversation turns"
        required: false
        type: string
        default: ""
      timeout_minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          assignee_trigger: ${{ inputs.assignee_trigger }}
          prompt: ${{ inputs.prompt }}
          claude_args: >-
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
            ${{ inputs.max_turns != '' && format('--max-turns {0}', inputs.max_turns) || '' }}
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            agent-sdk-dev@claude-plugins-official
            clangd-lsp@claude-plugins-official
            claude-code-setup@claude-plugins-official
            claude-md-management@claude-plugins-official
            code-modernization@claude-plugins-official
            code-review@claude-plugins-official
            code-simplifier@claude-plugins-official
            commit-commands@claude-plugins-official
            csharp-lsp@claude-plugins-official
            explanatory-output-style@claude-plugins-official
            feature-dev@claude-plugins-official
            frontend-design@claude-plugins-official
            gopls-lsp@claude-plugins-official
            hookify@claude-plugins-official
            jdtls-lsp@claude-plugins-official
            kotlin-lsp@claude-plugins-official
            learning-output-style@claude-plugins-official
            lua-lsp@claude-plugins-official
            mcp-server-dev@claude-plugins-official
            php-lsp@claude-plugins-official
            playground@claude-plugins-official
            plugin-dev@claude-plugins-official
            pr-review-toolkit@claude-plugins-official
            pyright-lsp@claude-plugins-official
            ralph-loop@claude-plugins-official
            ruby-lsp@claude-plugins-official
            rust-analyzer-lsp@claude-plugins-official
            security-guidance@claude-plugins-official
            session-report@claude-plugins-official
            skill-creator@claude-plugins-official
            swift-lsp@claude-plugins-official
            typescript-lsp@claude-plugins-official
