name: Routine — Release Notes Generator (API Relay)

on:
  release:
    types: [published]

jobs:
  relay-to-routine:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Claude Release Notes Generator Routine via API
        run: |
          curl -s -X POST \
            "https://api.anthropic.com/v1/claude_code/routines/trig_01H6Kh7BGZK8WFcFTyJBmK2X/fire" \
            -H "Authorization: Bearer ${{ secrets.ROUTINE_RELEASE_NOTES_TOKEN }}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Release published in ${{ github.repository }}.\n\nTag: ${{ github.event.release.tag_name }}\nName: ${{ github.event.release.name }}\nAuthor: ${{ github.event.release.author.login }}\nURL: ${{ github.event.release.html_url }}\nPrerelease: ${{ github.event.release.prerelease }}\n\nBody:\n${{ github.event.release.body }}\"}"
